  return '<span class="badge badge-running">partial</span>';
}

function renderMonthlyHeatmap(d) {
  if (!d.monthly || Object.keys(d.monthly).length === 0) return '';
  const allMonths = [];
  for (let y = 2022; y <= 2026; y++) {
    const maxM = y === 2026 ? 2 : 12;
    for (let m = 1; m <= maxM; m++) {
      allMonths.push(`${y}-${String(m).padStart(2,'0')}`);
    }
  }
  const fb = new Set(d.fallback_months || []);
  const scrapeDone = d.scraping_done;

  let html = '<div class="monthly-grid">';
  let lastYear = '';
  for (const m of allMonths) {
    const yr = m.substring(0,4);
    if (yr !== lastYear) {
      if (lastYear) html += '</div><div class="monthly-grid">';
      html += `<div style="width:30px;font-size:0.6rem;color:#64748b;display:flex;align-items:center;">${yr}</div>`;
      lastYear = yr;
    }
    const md = d.monthly[m];
    const isFallback = fb.has(m);
    let bg, border, title;

    if (isFallback) {
      // Fallback from original corpus — orange border
      bg = '#78350f'; border = '2px solid #f59e0b';
      title = `${m}: original corpus fallback (supplement < 100)`;
    } else if (!md || md.total === 0) {
      if (scrapeDone) {
        bg = '#450a0a'; border = '1px solid #7f1d1d';  // red = gap, no more scraping expected
        title = `${m}: NO DATA (scraping complete, gap)`;
      } else {
        bg = '#1e293b'; border = '1px solid #334155';  // dark = awaiting scrape
        title = `${m}: awaiting scrape`;
      }
    } else {
      const t = md.total;
      const nerPct = t > 0 ? Math.round(100*md.has_ner/t) : 0;
      const capPct = md.is_ukraine > 0 ? Math.round(100*md.has_cap/md.is_ukraine) : (md.has_ner > 0 ? 0 : -1);
      title = `${m}: ${t} articles | NER: ${md.has_ner}/${t} (${nerPct}%) | War: ${md.is_ukraine} | CAP: ${md.has_cap} | Sent: ${md.has_sent}`;

      if (md.has_cap > 0 && md.has_sent > 0 && md.has_ner >= t * 0.95) {
        bg = '#065f46'; border = '1px solid #10b981';  // green = fully enriched
      } else if (md.has_ner >= t * 0.95) {
        bg = '#1e40af'; border = '1px solid #3b82f6';  // blue = NER done, awaiting CAP/Sent
      } else if (md.has_ner > 0) {
        // Partial NER — gradient blue
        const pct = md.has_ner / t;
        bg = `rgba(30,64,175,${(0.3 + pct * 0.7).toFixed(2)})`;
        border = '1px solid #334155';
      } else {
        // Scraped but no NER
        const intensity = Math.min(200, Math.round(80 + t / 20));
        bg = `rgb(${intensity},${intensity},${Math.round(intensity*0.6)})`;
        border = '1px solid #334155';
      }
    }
    html += `<div class="month-cell" style="background:${bg};border:${border}" title="${title}"></div>`;
  }
  html += '</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;font-size:0.55rem;color:#64748b;">'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#1e293b;border:1px solid #334155;border-radius:1px;vertical-align:middle;"></span> awaiting</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#b0b0a0;border:1px solid #334155;border-radius:1px;vertical-align:middle;"></span> scraped</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#1e40af;border:1px solid #3b82f6;border-radius:1px;vertical-align:middle;"></span> NER</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#065f46;border:1px solid #10b981;border-radius:1px;vertical-align:middle;"></span> enriched</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#78350f;border:2px solid #f59e0b;border-radius:1px;vertical-align:middle;"></span> fallback</span>'
    + '<span><span style="display:inline-block;width:10px;height:10px;background:#450a0a;border:1px solid #7f1d1d;border-radius:1px;vertical-align:middle;"></span> gap</span>'
    + '</div>';
  return html;
}

function renderCard(d) {
  if (!d.file_exists) {
    return `<div class="card">
      <div class="card-header">
        <h2>${d.label}</h2>
        <div><span class="badge badge-${d.country.toLowerCase()}">${d.country}</span></div>
      </div>
      <div class="no-file">Supplement CSV not found</div>
    </div>`;
  }

  const nerPct = pct(d.has_ner, d.total);
  const orientBadge = d.orientation === 'illiberal'
    ? '<span class="badge badge-illib">illib</span>'
    : '<span class="badge badge-lib">lib</span>';

  // Ukraine progress
  const ukrCapPct = pct(d.has_cap_ukraine, d.is_ukraine);
  const ukrSentPct = pct(d.has_sentiment_ukraine, d.is_ukraine);
  // Full database progress
  const allCapPct = pct(d.has_cap, d.total);
  const allSentPct = pct(d.has_sentiment, d.total);

  // Scraping info line
  const scrapingLine = d.scraper_active
    ? `<div class="scraping-info">Scraper active &middot; ${fmt(d.total)} rows &middot; ${d.file_size_mb} MB &middot; latest: ${d.latest_scraped_at || '—'}</div>`
    : (d.has_ner === 0 && d.total > 0
      ? `<div class="scraping-info muted">${fmt(d.total)} rows scraped &middot; ${d.file_size_mb} MB &middot; latest: ${d.latest_scraped_at || '—'}</div>`
      : '');

  return `<div class="card">
    <div class="card-header">
      <h2>${d.label}</h2>
      <div>${statusBadge(d)} ${orientBadge} <span class="badge badge-${d.country.toLowerCase()}">${d.country}</span></div>
    </div>
    ${scrapingLine}
    <div class="progress-row">
      <div class="progress-label"><span>NER</span><span>${fmt(d.has_ner)} / ${fmt(d.total)} (${nerPct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill fill-ner" style="width:${nerPct}%"></div></div>
    </div>
    <div class="two-col">
      <div>
        <div class="col-label">Ukraine-war (${fmt(d.is_ukraine)} articles)</div>
        <div class="progress-row">
          <div class="progress-label"><span>CAP</span><span>${fmt(d.has_cap_ukraine)} (${ukrCapPct}%)</span></div>
          <div class="progress-bar"><div class="progress-fill fill-cap-ukr" style="width:${ukrCapPct}%"></div></div>
        </div>
        <div class="progress-row">
          <div class="progress-label"><span>Sent</span><span>${fmt(d.has_sentiment_ukraine)} (${ukrSentPct}%)</span></div>
          <div class="progress-bar"><div class="progress-fill fill-sent-ukr" style="width:${ukrSentPct}%"></div></div>
        </div>
      </div>
      <div>
        <div class="col-label">Full database (${fmt(d.total)} articles)</div>
        <div class="progress-row">
          <div class="progress-label"><span>CAP</span><span>${fmt(d.has_cap)} (${allCapPct}%)</span></div>
          <div class="progress-bar"><div class="progress-fill fill-cap" style="width:${allCapPct}%"></div></div>
        </div>
        <div class="progress-row">
          <div class="progress-label"><span>Sent</span><span>${fmt(d.has_sentiment)} (${allSentPct}%)</span></div>
          <div class="progress-bar"><div class="progress-fill fill-sent" style="width:${allSentPct}%"></div></div>
        </div>
      </div>
    </div>
    <div class="modified">Modified: ${d.file_modified || '—'}</div>
    ${renderMonthlyHeatmap(d)}
  </div>`;
}

function renderSummary(data) {
  const t = data.reduce((acc, d) => {
    acc.total += d.total;
    acc.has_ner += d.has_ner;
    acc.is_ukraine += d.is_ukraine;
    acc.has_cap += d.has_cap;
    acc.has_sentiment += d.has_sentiment;
    acc.has_cap_ukraine += d.has_cap_ukraine;
    acc.has_sentiment_ukraine += d.has_sentiment_ukraine;
    acc.needs_cap += d.needs_cap_all;
    acc.needs_sent += d.needs_sentiment_all;
    return acc;
  }, { total:0, has_ner:0, is_ukraine:0, has_cap:0, has_sentiment:0,
        has_cap_ukraine:0, has_sentiment_ukraine:0, needs_cap:0, needs_sent:0 });

  const ukrCapP = pctN(t.has_cap_ukraine, t.is_ukraine);
  const ukrSentP = pctN(t.has_sentiment_ukraine, t.is_ukraine);
  const allCapP = pctN(t.has_cap, t.total);
  const allSentP = pctN(t.has_sentiment, t.total);

  return `<div class="summary">
    <h2>Overall Progress</h2>
    <div class="summary-row">
      <div class="summary-block">
        <h3>Ukraine-war articles</h3>
        <div class="summary-nums">
          <div class="stat"><div class="stat-value">${fmt(t.is_ukraine)}</div><div class="stat-label">Total</div></div>
          <div class="stat"><div class="stat-value big-pct ${pctClass(ukrCapP)}">${ukrCapP.toFixed(1)}%</div><div class="stat-label">CAP done</div></div>
          <div class="stat"><div class="stat-value big-pct ${pctClass(ukrSentP)}">${ukrSentP.toFixed(1)}%</div><div class="stat-label">Sentiment done</div></div>
        </div>
      </div>
      <div class="summary-block">
        <h3>Full database</h3>
        <div class="summary-nums">
          <div class="stat"><div class="stat-value">${fmt(t.total)}</div><div class="stat-label">Total</div></div>
          <div class="stat"><div class="stat-value big-pct ${pctClass(allCapP)}">${allCapP.toFixed(1)}%</div><div class="stat-label">CAP done</div></div>
          <div class="stat"><div class="stat-value big-pct ${pctClass(allSentP)}">${allSentP.toFixed(1)}%</div><div class="stat-label">Sentiment done</div></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:16px;">
      <div class="stat" style="flex:1;"><div class="stat-value">${pct(t.has_ner, t.total)}%</div><div class="stat-label">NER complete</div></div>
      <div class="stat" style="flex:1;"><div class="stat-value">${fmt(t.needs_cap)}</div><div class="stat-label">Remaining CAP</div></div>
      <div class="stat" style="flex:1;"><div class="stat-value">${fmt(t.needs_sent)}</div><div class="stat-label">Remaining Sent</div></div>
    </div>
  </div>`;
}

const app = document.getElementById('app');
app.innerHTML = renderSummary(DATA)
  + '<div class="grid">' + DATA.map(renderCard).join('') + '</div>'
  + '<p class="refresh-note">Run <code>python3 enrichment_progress.py --html</code> to refresh &nbsp;&middot;&nbsp; '
  + '<code>watch -n 60 python3 enrichment_progress.py --html</code> for auto-refresh</p>';
</script>
</body>
</html>
